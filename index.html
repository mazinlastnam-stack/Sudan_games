<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHOS | المنظومة الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-blue: #00d4ff; --dark-bg: #0d0d0d; --card-bg: #141414; }
        * { font-family: 'Tajawal', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background-color: var(--dark-bg); background-image: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%); color: white; }
        
        .logo-glow { filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.3)); animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.2)); } 50% { filter: drop-shadow(0 0 25px rgba(0, 212, 255, 0.5)); } }

        .custom-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; }
        .custom-card:hover { border-color: var(--primary-blue); background: rgba(0, 212, 255, 0.08); }

        /* تنسيق قائمة المشاريع المنسدلة */
        .projects-container { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; }
        .projects-container.open { max-height: 600px; }

        .project-item { background: rgba(255, 255, 255, 0.03); border-right: 2px solid transparent; }
        .project-item:hover { border-right-color: var(--primary-blue); background: rgba(0, 212, 255, 0.05); }

        .modal { display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content { background: #111; border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 28px; max-width: 400px; width: 100%; padding: 35px; position: relative; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .rotate-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-6">

<div class="main-container max-w-sm w-full bg-[#111] rounded-[32px] p-8 border border-white/5 relative shadow-2xl">
    <div class="relative z-10 text-center">
        <img src="1000029489.png" alt="ARCHOS Logo" class="logo-img w-full mb-6 logo-glow">
        <div class="slogan mb-8 pb-4 border-b border-white/10 text-gray-400 text-xs font-bold tracking-widest uppercase">
            الذكاء أصلاً والمنطق نصلاً
        </div>
    </div>

    <div id="socialGrid" class="grid grid-cols-2 gap-4 mb-4">
    </div>

    <div onclick="toggleProjects()" class="custom-card col-span-2 flex items-center justify-between p-5 rounded-2xl border-l-4 border-l-[var(--primary-blue)]">
        <div class="flex items-center gap-4">
            <i class="fas fa-layer-group text-xl text-[var(--primary-blue)]"></i>
            <span class="text-sm font-black text-gray-200">مشاريع ARCHOS</span>
        </div>
        <i id="chevronIcon" class="fas fa-chevron-down text-xs text-gray-500 transition-transform"></i>
    </div>

    <div id="projectsWrapper" class="projects-container flex flex-col gap-2 mt-2">
    </div>

    <div class="mt-8 text-center text-[10px] text-gray-600 font-mono tracking-tighter uppercase">
        &copy; 2025 ARCHOS Protocol | The Systematic Mind
    </div>
</div>

<div id="infoModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content text-center" onclick="event.stopPropagation()">
        <div id="modalIcon" class="text-5xl text-[var(--primary-blue)] mb-5"></div>
        <h2 id="modalTitle" class="text-2xl font-black text-white mb-3 tracking-wide"></h2>
        <p id="modalDesc" class="text-gray-400 text-sm mb-8 leading-relaxed px-2"></p>
        
        <div class="flex flex-col gap-3">
            <a id="modalActionBtn" href="#" target="_blank" class="bg-[var(--primary-blue)] text-black font-black py-4 rounded-2xl hover:brightness-110 active:scale-95 shadow-lg shadow-blue-500/20"></a>
            <button onclick="closeModal(null)" class="text-gray-500 text-xs font-bold py-2 hover:text-white">إغلاق</button>
        </div>
    </div>
</div>

<script>
    const socialLinks = [
        { id: 'wa', title: 'واتساب', icon: 'fab fa-whatsapp', desc: 'تواصل مباشر للاستشارات البرمجية.', link: 'https://wa.me/249115169965', btn: 'بدء المحادثة' },
        { id: 'tk', title: 'تيك توك', icon: 'fab fa-tiktok', desc: 'محتوى تقني وبصري سريع.', link: 'https://www.tiktok.com/@mazin.hassan025?_r=1&_t=ZS-957zkoHkGxN', btn: 'متابعة' },
        { id: 'ig', title: 'انستغرام', icon: 'fab fa-instagram', desc: 'معرض الأعمال والتصاميم.', link: 'https://www.instagram.com/mazin_hassan09?igsh=MXMyZHM4MGR4d2s3YQ==', btn: 'رؤية المعرض' },
        { id: 'fb', title: 'فيسبوك', icon: 'fab fa-facebook-f', desc: 'عاشق للكلمات والمعاني، يؤمن بأن الصمت لغة الروح، وشغوف بالفكر والقراءة والفلسفة..', link: 'https://www.facebook.com/share/1Ackwo1Cbc/', btn: 'زيارة الصفحة' }
    ];

    const projects = [
        { id: 'ph', title: 'صيدلتي', icon: 'fas fa-hand-holding-medical', desc: 'نموذج أولي لمنصة صيدلانية ذكية لربط المرضى بالصيدليات وتسهيل الوصول للأدوية.', link: 'https://mazinlastnam-stack.github.io/My-Pharmacy/#', btn: 'معاينة المشروع' },
        { id: 'sg', title: 'سودان جيمز', icon: 'fas fa-gamepad', desc: 'متجرك الرقمي الأول في السودان لشحن الألعاب والخدمات عبر الإنترنت بكفاءة عالية.', link: 'https://mazinlastnam-stack.github.io/Sudan_games/', btn: 'زيارة المتجر' },
        { id: 'tr', title: 'ترند الاناقة', icon: 'fas fa-tshirt', desc: 'منصة متخصصة في تجارة الملابس والإكسسوارات العصرية داخل السودان.', link: 'https://mazinlastnam-stack.github.io/Fashion_trend/#', btn: 'استكشاف الأناقة' },
        { id: 'as', title: 'مطاعم الاسعد', icon: 'fas fa-utensils', desc: 'نظام إدارة وطلب طعام رقمي يهدف لتحسين تجربة العملاء في قطاع المطاعم.', link: 'https://mazinlastnam-stack.github.io/Sudan-games-2.0/', btn: 'زيارة النظام' }
    ];

    function renderSystem() {
        const socialGrid = document.getElementById('socialGrid');
        const projectsWrapper = document.getElementById('projectsWrapper');
        
        socialLinks.forEach(item => {
            socialGrid.innerHTML += `
                <div onclick="openModal('social', '${item.id}')" class="custom-card flex flex-col items-center p-5 rounded-2xl group">
                    <i class="${item.icon} text-2xl text-[var(--primary-blue)]"></i>
                    <span class="mt-2 text-[10px] text-gray-400 font-bold">${item.title}</span>
                </div>
            `;
        });

        projects.forEach(item => {
            projectsWrapper.innerHTML += `
                <div onclick="openModal('project', '${item.id}')" class="project-item flex items-center justify-between p-4 rounded-xl cursor-pointer">
                    <div class="flex items-center gap-3">
                        <i class="${item.icon} text-sm text-[var(--primary-blue)]"></i>
                        <span class="text-xs font-bold text-gray-300">${item.title}</span>
                    </div>
                    <i class="fas fa-plus text-[8px] text-[var(--primary-blue)] opacity-50"></i>
                </div>
            `;
        });
    }

    function toggleProjects() {
        const wrapper = document.getElementById('projectsWrapper');
        const chevron = document.getElementById('chevronIcon');
        wrapper.classList.toggle('open');
        chevron.classList.toggle('rotate-icon');
    }

    function openModal(type, id) {
        const data = type === 'project' ? projects.find(p => p.id === id) : socialLinks.find(s => s.id === id);
        if(!data) return;

        const modal = document.getElementById('infoModal');
        document.getElementById('modalIcon').innerHTML = `<i class="${data.icon}"></i>`;
        document.getElementById('modalTitle').innerText = data.title;
        document.getElementById('modalDesc').innerText = data.desc;
        
        const actionBtn = document.getElementById('modalActionBtn');
        actionBtn.innerText = data.btn;
        actionBtn.href = data.link;

        modal.classList.add('active');
    }

    function closeModal(e) {
        if (!e || e.target.id === 'infoModal') {
            document.getElementById('infoModal').classList.remove('active');
        }
    }

    window.onload = renderSystem;
</script>

</body>
</html>
